services:
  - type: web
    name: dealspy-bot
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ALLOWED_CHAT_ID
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: AMAZON_PARTNER_TAG
        sync: false
      - key: APP_URL
        sync: false
      - key: AMAZON_ACCESS_KEY
        sync: false
      - key: AMAZON_SECRET_KEY
        sync: false